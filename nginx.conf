server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Dòng lệnh cực kỳ quan trọng cho React Router:
        # Nếu không tìm thấy file, sẽ điều hướng về index.html để React Router tự xử lý
        try_files $uri $uri/ /index.html;
    }

    # Báo lỗi 50x sẽ điều hướng về trang lỗi tùy chỉnh (tùy chọn)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
